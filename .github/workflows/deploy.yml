# ============================================================
# BuffetPro — Production Deploy Workflow (PowerShell)
# ============================================================
#
# Triggered on every push to the `master` branch.
# Three parallel jobs:
#   1. deploy-backend  — SSH into VPS, update Laravel, run migrations
#   2. deploy-web      — Build & deploy apps/web  to Vercel
#   3. deploy-admin    — Build & deploy apps/admin to Vercel
#
# Required GitHub Secrets:
#   SSH_HOST                 VPS hostname or IP
#   SSH_USER                 SSH login username
#   SSH_PRIVATE_KEY          RSA / Ed25519 private key (PEM)
#   SSH_PORT                 SSH port (default 22 — set in repo vars)
#   DEPLOY_PATH              Absolute path to the cloned repo on the VPS
#                            e.g. /var/www/buffetpro
#   APP_KEY                  Laravel APP_KEY (base64:…)
#   JWT_SECRET               JWT signing secret
#   DB_PASSWORD              MySQL password
#   STRIPE_KEY               Stripe publishable key
#   STRIPE_SECRET            Stripe secret key
#   STRIPE_WEBHOOK_SECRET    Stripe webhook signing secret
#   CORS_ALLOWED_ORIGINS     Comma-separated list of allowed CORS origins
#   VERCEL_TOKEN             Vercel personal access token
#   VERCEL_ORG_ID            Vercel team / personal org ID
#   VERCEL_PROJECT_ID_WEB    Vercel project ID for apps/web
#   VERCEL_PROJECT_ID_ADMIN  Vercel project ID for apps/admin
# ============================================================

name: Deploy to Production

on:
  push:
    branches:
      - master

permissions:
  contents: read

# Cancel any in-progress deploy for the same branch so we never
# run two deploys at the same time.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

# ── Re-usable defaults ────────────────────────────────────────
env:
  NODE_VERSION: "20"
  PHP_VERSION: "8.2"
  PNPM_VERSION: "8"

# ─────────────────────────────────────────────────────────────
# JOB 1 — Laravel backend (SSH → VPS)
# ─────────────────────────────────────────────────────────────
jobs:
  deploy-backend:
    name: "🚀 Deploy Backend (Laravel)"
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout (needed to validate the commit exists) ──
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Write SSH private key to disk ──────────────────
      - name: Write SSH key
        shell: pwsh
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          $keyDir  = "$env:HOME/.ssh"
          $keyFile = "$keyDir/deploy_key"
          New-Item -ItemType Directory -Force -Path $keyDir | Out-Null
          [System.IO.File]::WriteAllText($keyFile, $env:SSH_PRIVATE_KEY + "`n")
          chmod 600 $keyFile
          Write-Host "SSH key written to $keyFile"

      # ── 3. Add VPS host to known_hosts ────────────────────
      - name: Trust VPS host key
        shell: pwsh
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT || '22' }}
        run: |
          $knownHosts = "$env:HOME/.ssh/known_hosts"
          $scanResult = ssh-keyscan -p $env:SSH_PORT -H $env:SSH_HOST 2>$null
          Add-Content -Path $knownHosts -Value $scanResult
          Write-Host "Host key for $env:SSH_HOST added to known_hosts"

      # ── 4. Run remote deployment commands via SSH ─────────
      - name: Deploy Laravel application
        shell: pwsh
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT || '22' }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          APP_KEY: ${{ secrets.APP_KEY }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          STRIPE_KEY: ${{ secrets.STRIPE_KEY }}
          STRIPE_SECRET: ${{ secrets.STRIPE_SECRET }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          CORS_ALLOWED_ORIGINS: ${{ secrets.CORS_ALLOWED_ORIGINS }}
          GIT_SHA: ${{ github.sha }}
        run: |
          # Build the remote shell script as a here-string so every variable
          # is expanded safely on the RUNNER before being sent over SSH.
          $remoteScript = @"
          set -euo pipefail

          echo "==> Navigating to deploy path: $env:DEPLOY_PATH/backend"
          cd "$env:DEPLOY_PATH/backend"

          echo "==> Pulling latest code (commit $env:GIT_SHA)"
          git fetch --depth=1 origin master
          git reset --hard $env:GIT_SHA

          echo "==> Installing Composer dependencies (no-dev)"
          composer install --no-dev --prefer-dist --no-interaction --optimize-autoloader

          echo "==> Writing .env"
          cat > .env <<'ENVEOF'
          APP_NAME=BuffetPro
          APP_ENV=production
          APP_KEY=$env:APP_KEY
          APP_DEBUG=false
          APP_URL=https://api.buffetpro.com

          DB_CONNECTION=mysql
          DB_HOST=127.0.0.1
          DB_PORT=3306
          DB_DATABASE=buffetpro
          DB_USERNAME=buffetpro_user
          DB_PASSWORD=$env:DB_PASSWORD

          JWT_SECRET=$env:JWT_SECRET
          JWT_TTL=15
          JWT_REFRESH_TTL=10080

          STRIPE_KEY=$env:STRIPE_KEY
          STRIPE_SECRET=$env:STRIPE_SECRET
          STRIPE_WEBHOOK_SECRET=$env:STRIPE_WEBHOOK_SECRET

          CORS_ALLOWED_ORIGINS=$env:CORS_ALLOWED_ORIGINS

          LOG_CHANNEL=stack
          LOG_STACK=single
          LOG_LEVEL=error

          QUEUE_CONNECTION=database
          CACHE_STORE=database
          SESSION_DRIVER=database
          FILESYSTEM_DISK=local
          ENVEOF

          echo "==> Running database migrations"
          php artisan migrate --force

          echo "==> Optimizing application caches"
          php artisan config:cache
          php artisan route:cache
          php artisan view:cache

          echo "==> Restarting PHP-FPM"
          sudo systemctl reload php8.2-fpm

          echo "==> Backend deployment complete ✔"
          "@

          $sshArgs = @(
            "-i", "$env:HOME/.ssh/deploy_key",
            "-p", $env:SSH_PORT,
            "-o", "StrictHostKeyChecking=yes",
            "$env:SSH_USER@$env:SSH_HOST",
            "bash -s"
          )
          $remoteScript | ssh @sshArgs

  # ─────────────────────────────────────────────────────────────
  # JOB 2 — Next.js web app  (apps/web → Vercel)
  # ─────────────────────────────────────────────────────────────
  deploy-web:
    name: "🌐 Deploy Web App (Next.js)"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm ${{ env.PNPM_VERSION }}
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install dependencies
        shell: pwsh
        run: |
          Write-Host "==> Installing workspace dependencies"
          pnpm install --frozen-lockfile

      - name: Build web app
        shell: pwsh
        env:
          NEXT_PUBLIC_APP_URL: ${{ vars.NEXT_PUBLIC_APP_URL }}
          NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL }}
        run: |
          Write-Host "==> Building @buffetpro/web"
          pnpm --filter @buffetpro/web build

      - name: Deploy to Vercel (web)
        shell: pwsh
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_WEB }}
        run: |
          Write-Host "==> Installing Vercel CLI"
          npm install --global vercel@latest --silent

          Write-Host "==> Pulling Vercel project settings"
          vercel pull --yes --environment=production `
            --token=$env:VERCEL_TOKEN

          Write-Host "==> Building with Vercel"
          vercel build --prod `
            --token=$env:VERCEL_TOKEN

          Write-Host "==> Deploying to Vercel"
          vercel deploy --prebuilt --prod `
            --token=$env:VERCEL_TOKEN

          Write-Host "==> Web app deployment complete ✔"

  # ─────────────────────────────────────────────────────────────
  # JOB 3 — Next.js admin app  (apps/admin → Vercel)
  # ─────────────────────────────────────────────────────────────
  deploy-admin:
    name: "🔧 Deploy Admin App (Next.js)"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm ${{ env.PNPM_VERSION }}
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install dependencies
        shell: pwsh
        run: |
          Write-Host "==> Installing workspace dependencies"
          pnpm install --frozen-lockfile

      - name: Build admin app
        shell: pwsh
        env:
          NEXT_PUBLIC_APP_URL: ${{ vars.NEXT_PUBLIC_APP_URL }}
          NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL }}
        run: |
          Write-Host "==> Building @buffetpro/admin"
          pnpm --filter @buffetpro/admin build

      - name: Deploy to Vercel (admin)
        shell: pwsh
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_ADMIN }}
        run: |
          Write-Host "==> Installing Vercel CLI"
          npm install --global vercel@latest --silent

          Write-Host "==> Pulling Vercel project settings"
          vercel pull --yes --environment=production `
            --token=$env:VERCEL_TOKEN

          Write-Host "==> Building with Vercel"
          vercel build --prod `
            --token=$env:VERCEL_TOKEN

          Write-Host "==> Deploying to Vercel"
          vercel deploy --prebuilt --prod `
            --token=$env:VERCEL_TOKEN

          Write-Host "==> Admin app deployment complete ✔"

  # ─────────────────────────────────────────────────────────────
  # JOB 4 — Post-deploy smoke test
  # ─────────────────────────────────────────────────────────────
  smoke-test:
    name: "🔍 Smoke Test"
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-web, deploy-admin]

    steps:
      - name: Ping backend health endpoint
        shell: pwsh
        env:
          API_URL: ${{ vars.NEXT_PUBLIC_API_URL }}
        run: |
          Write-Host "==> Checking $env:API_URL/api/health"
          $maxAttempts = 5
          $attempt     = 0
          $ok          = $false

          while ($attempt -lt $maxAttempts -and -not $ok) {
            $attempt++
            try {
              $response = Invoke-WebRequest -Uri "$env:API_URL/api/health" `
                            -UseBasicParsing -TimeoutSec 10 -ErrorAction Stop
              if ($response.StatusCode -eq 200) {
                Write-Host "✔ Backend is up (attempt $attempt)"
                $ok = $true
              }
            } catch {
              Write-Warning "Attempt $attempt failed: $_"
              if ($attempt -lt $maxAttempts) {
                Start-Sleep -Seconds 10
              }
            }
          }

          if (-not $ok) {
            Write-Error "Backend health check failed after $maxAttempts attempts"
            exit 1
          }

      - name: Ping web app
        shell: pwsh
        env:
          WEB_URL: ${{ vars.NEXT_PUBLIC_APP_URL }}
        run: |
          Write-Host "==> Checking $env:WEB_URL"
          $response = Invoke-WebRequest -Uri $env:WEB_URL `
                        -UseBasicParsing -TimeoutSec 15 -ErrorAction Stop
          if ($response.StatusCode -ne 200) {
            Write-Error "Web app returned HTTP $($response.StatusCode)"
            exit 1
          }
          Write-Host "✔ Web app is up"
